name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend build
        run: npm run build:frontend
        env:
          VITE_API_BASE_URL: http://localhost:4000
          VITE_TELEGRAM_BOT_URL: https://t.me/finance_tracket_bot
