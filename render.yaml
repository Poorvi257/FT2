services:
  - type: web
    name: ft2-backend
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm --workspace @ft2/backend run start
    healthCheckPath: /health
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAGIC_LINK_SECRET
        sync: false
      - key: MAGIC_LINK_TTL_MINUTES
        value: 15
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_REGISTRY_SHEET_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: DEFAULT_TIMEZONE
        value: Asia/Kolkata
      - key: DEFAULT_CURRENCY
        value: INR
